---
# update-credential.yml
#
# Called by Ansible Event-Driven Automation (EDA) when Akeyless sends a
# webhook notification that a rotated secret has been updated. This is the
# "push model" - replaces the Monday morning cron job.
#
# The webhook payload from Akeyless Event Center looks like:
# {
#   "Akeyless_Events": {
#     "rotated-secret-success": [
#       {
#         "item_name": "/Ansible/Credentials/server-build-svc",
#         "item_type": "ROTATED_SECRET",
#         ...
#       }
#     ]
#   }
# }
#
# EDA passes the event body as {{ ansible_eda.event.payload }}
#
- name: Update Ansible credential from Akeyless rotation event
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    # Map Akeyless secret paths to Ansible credential objects
    credential_map:
      "/Ansible/Credentials/server-build-svc":
        ansible_credential_name: "Server Build Service Account"
        credential_type: "Machine"
        input_fields:
          - username
          - password
      "/Ansible/Credentials/api-token-eda":
        ansible_credential_name: "EDA API Token"
        credential_type: "Ansible Automation Platform"
        input_fields:
          - token

  tasks:
    - name: Extract rotated secret events from webhook payload
      ansible.builtin.set_fact:
        rotation_events: "{{ ansible_eda.event.payload.Akeyless_Events['rotated-secret-success'] | default([]) }}"

    - name: Authenticate to Akeyless
      akeyless.secrets_management.login:
        akeyless_api_url: "{{ akeyless_api_url }}"
        access_id: "{{ akeyless_access_id }}"
        access_key: "{{ akeyless_access_key }}"
        access_type: "api_key"
      register: akeyless_auth
      no_log: true

    - name: Process each rotation event
      ansible.builtin.include_tasks: update-single-credential.yml
      loop: "{{ rotation_events }}"
      loop_control:
        loop_var: rotation_event
        label: "{{ rotation_event.item_name }}"
      when: rotation_event.item_name in credential_map
