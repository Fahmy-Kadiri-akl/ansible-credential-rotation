---
# update-single-credential.yml
#
# Included task file that handles a single rotation event.
# Called from update-credential.yml with rotation_event as the loop var.

- name: "Fetch new secret value from Akeyless: {{ rotation_event.item_name }}"
  akeyless.secrets_management.get_rotated_secret_value:
    akeyless_api_url: "{{ akeyless_api_url }}"
    name: "{{ rotation_event.item_name }}"
    token: "{{ akeyless_auth.data.token }}"
  register: secret_value
  no_log: true

- name: "Look up credential mapping for {{ rotation_event.item_name }}"
  ansible.builtin.set_fact:
    cred_config: "{{ credential_map[rotation_event.item_name] }}"

- name: "Update Ansible credential: {{ cred_config.ansible_credential_name }}"
  ansible.controller.credential:
    controller_host: "{{ controller_host | default(ansible_controller_url) }}"
    controller_username: "{{ controller_username | default(ansible_controller_admin_user) }}"
    controller_password: "{{ controller_password }}"
    validate_certs: false
    name: "{{ cred_config.ansible_credential_name }}"
    organization: "Default"
    credential_type: "{{ cred_config.credential_type }}"
    inputs: "{{ secret_value.data }}"
    state: present
  no_log: true

- name: "Log credential update"
  ansible.builtin.debug:
    msg: "Updated credential '{{ cred_config.ansible_credential_name }}' from rotated secret '{{ rotation_event.item_name }}'"
