---
# fetch-credentials.yml
#
# Fetches rotated credentials from Akeyless and updates the corresponding
# credential objects in Ansible AAP/AWX. This is the "pull model" that
# Matt's team currently runs every Monday at midnight.
#
# Usage:
#   ansible-playbook playbooks/fetch-credentials.yml \
#     -e akeyless_access_id=p-xxxx \
#     -e akeyless_access_key=xxxx \
#     -e controller_host=https://ansible.example.com \
#     -e controller_username=admin \
#     -e controller_password=secret
#
- name: Fetch rotated credentials from Akeyless and update Ansible
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    # List of Akeyless rotated secrets mapped to Ansible credential objects.
    # Each entry maps an Akeyless secret path to an Ansible credential name.
    credential_mappings:
      - akeyless_path: "/Ansible/Credentials/server-build-svc"
        ansible_credential_name: "Server Build Service Account"
        credential_type: "Machine"
        field_mapping:
          username: "username"
          password: "password"

      - akeyless_path: "/Ansible/Credentials/api-token-eda"
        ansible_credential_name: "EDA API Token"
        credential_type: "Ansible Automation Platform"
        field_mapping:
          token: "oauth_token"

  tasks:
    - name: Authenticate to Akeyless
      akeyless.secrets_management.login:
        akeyless_api_url: "{{ akeyless_api_url }}"
        access_id: "{{ akeyless_access_id }}"
        access_key: "{{ akeyless_access_key }}"
        access_type: "api_key"
      register: akeyless_auth
      no_log: true

    - name: Fetch each rotated secret from Akeyless
      akeyless.secrets_management.get_rotated_secret_value:
        akeyless_api_url: "{{ akeyless_api_url }}"
        name: "{{ item.akeyless_path }}"
        token: "{{ akeyless_auth.data.token }}"
      register: fetched_secrets
      loop: "{{ credential_mappings }}"
      loop_control:
        label: "{{ item.akeyless_path }}"
      no_log: true

    - name: Update Ansible credentials with fetched values
      ansible.controller.credential:
        controller_host: "{{ controller_host | default(ansible_controller_url) }}"
        controller_username: "{{ controller_username | default(ansible_controller_admin_user) }}"
        controller_password: "{{ controller_password }}"
        validate_certs: false
        name: "{{ item.item.ansible_credential_name }}"
        organization: "Default"
        credential_type: "{{ item.item.credential_type }}"
        inputs: "{{ item.data | json_query(item.item.field_mapping) }}"
        state: present
      loop: "{{ fetched_secrets.results }}"
      loop_control:
        label: "{{ item.item.ansible_credential_name }}"
      no_log: true
