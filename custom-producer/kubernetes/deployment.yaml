apiVersion: v1
kind: Namespace
metadata:
  name: ansible
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ansible-cred-producer
  namespace: ansible
  labels:
    app: ansible-cred-producer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ansible-cred-producer
  template:
    metadata:
      labels:
        app: ansible-cred-producer
    spec:
      containers:
        - name: producer
          image: ghcr.io/fahmy-kadiri-akl/ansible-cred-producer:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PORT
              value: "8080"
            - name: AKEYLESS_ACCESS_ID
              valueFrom:
                secretKeyRef:
                  name: ansible-cred-producer-secrets
                  key: akeyless-access-id
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ansible-cred-producer
  namespace: ansible
spec:
  selector:
    app: ansible-cred-producer
  ports:
    - port: 8080
      targetPort: http
      name: http
  type: ClusterIP
---
apiVersion: v1
kind: Secret
metadata:
  name: ansible-cred-producer-secrets
  namespace: ansible
type: Opaque
stringData:
  # Replace with your Akeyless Gateway access ID
  akeyless-access-id: "p-REPLACE_WITH_YOUR_ACCESS_ID"
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ansible-cred-producer
  namespace: ansible
  annotations:
    cert-manager.io/cluster-issuer: your-cluster-issuer
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - ansible-producer.example.com
      secretName: ansible-producer-tls
  rules:
    - host: ansible-producer.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ansible-cred-producer
                port:
                  number: 8080
