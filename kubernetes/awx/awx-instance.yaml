---
apiVersion: awx.ansible.com/v1beta1
kind: AWX
metadata:
  name: awx
  namespace: ansible
spec:
  # Lightweight deployment for POC
  replicas: 1

  # Admin user
  admin_user: admin

  # Ingress
  ingress_type: ingress
  ingress_class_name: nginx
  hostname: ansible.example.com
  ingress_tls_secret: awx-tls
  ingress_annotations: |
    cert-manager.io/cluster-issuer: your-cluster-issuer

  # Resource limits for POC
  web_resource_requirements:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi

  task_resource_requirements:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi

  ee_resource_requirements:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

  # PostgreSQL
  # Omit postgres_storage_class to use your cluster's default StorageClass.
  # Examples: gp2/gp3 (EKS), standard (GKE), local-path (K3s), microk8s-hostpath (MicroK8s)
  # Uncomment and set if your cluster has no default or you need a specific class:
  # postgres_storage_class: local-path
  postgres_storage_requirements:
    requests:
      storage: 5Gi

  # Projects storage
  projects_persistence: true
  # projects_storage_class: local-path
  projects_storage_size: 2Gi
